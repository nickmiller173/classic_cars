[theme]
# The vibrant cyan/light blue accent color Cars & Bids uses
primaryColor = "#00b2e3"

# The main background color (dark gray/almost black)
backgroundColor = "#121212"

# The background color for text inputs, dropdowns, and sidebars
secondaryBackgroundColor = "#1f1f1f"

# The text color (off-white for high readability)
textColor = "#ffffff"

# Professional font style
font = "sans serif"